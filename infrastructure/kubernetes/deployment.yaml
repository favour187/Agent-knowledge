apiVersion: apps/v1
kind: Deployment
metadata:
  name: arena-api
  namespace: arena
  labels:
    app: arena-api
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: arena-api
  template:
    metadata:
      labels:
        app: arena-api
        component: api
    spec:
      serviceAccountName: arena-api
      containers:
        - name: api
          image: arena-ai-platform/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: arena-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: arena-config
                  key: redis-url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: arena-secrets
                  key: openai-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: arena-secrets
                  key: anthropic-api-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - arena-api
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: arena-api-service
  namespace: arena
spec:
  selector:
    app: arena-api
  ports:
    - port: 80
      targetPort: 8000
      name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arena-frontend
  namespace: arena
  labels:
    app: arena-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arena-frontend
  template:
    metadata:
      labels:
        app: arena-frontend
        component: frontend
    spec:
      containers:
        - name: frontend
          image: arena-ai-platform/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: arena-frontend-service
  namespace: arena
spec:
  selector:
    app: arena-frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arena-ingress
  namespace: arena
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - arena.example.com
      secretName: arena-tls
  rules:
    - host: arena.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: arena-api-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: arena-frontend-service
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: arena-api-hpa
  namespace: arena
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: arena-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
