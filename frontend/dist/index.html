<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arena — Agent Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#app{height:100%;width:100%;overflow:hidden}
body{background:#0a0a0a;color:#ededed;font-family:'Inter',-apple-system,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:99px}
::selection{background:rgba(59,130,246,0.3)}

/* Top Nav */
.nav{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid #2a2a2a;background:#0a0a0a;flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:12px}
.nav-logo{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px;color:#ededed}
.nav-mode{padding:4px 10px;border-radius:6px;background:#1a1a1a;border:1px solid #2a2a2a;font-size:12px;font-weight:500;color:#a0a0a0;cursor:pointer}
.nav-link{padding:6px 12px;border-radius:6px;font-size:12px;color:#666;cursor:pointer;border:none;background:transparent;font-family:inherit}
.nav-link:hover{color:#a0a0a0;background:#1a1a1a}
.nav-right{display:flex;align-items:center;gap:8px}

/* Layout */
.shell{display:flex;flex-direction:column;height:100vh}
.main{flex:1;display:flex;overflow:hidden}

/* Chat */
.chat{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.scroll{flex:1;overflow-y:auto;padding:24px 0;-webkit-overflow-scrolling:touch}
.inner{max-width:768px;margin:0 auto;padding:0 20px;width:100%}

/* Messages */
.msg{display:flex;gap:12px;padding:16px 0;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}}
.avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;font-size:12px;font-weight:600;color:white}
.avatar.user{background:#1a1a1a;color:#666}
.avatar.agent{background:#3b82f6}
.body{flex:1;min-width:0;overflow:hidden}
.role{font-size:12px;font-weight:600;color:#a0a0a0;margin-bottom:4px}
.text{font-size:14px;line-height:1.7;color:#ededed;word-break:break-word}
.text p{margin-bottom:8px}
.text p:last-child{margin-bottom:0}
.text strong{font-weight:600;color:white}
.text code{background:#1a1a1a;padding:2px 6px;border-radius:4px;font-size:13px;font-family:'JetBrains Mono',monospace;word-break:break-all}
.text pre{background:#141414;border:1px solid #2a2a2a;border-radius:8px;padding:14px;margin:10px 0;overflow-x:auto;font-size:12px;line-height:1.5}
.text pre code{background:transparent;padding:0}
.text ul,.text ol{padding-left:20px;margin:8px 0}
.text li{margin-bottom:4px}

/* Tool pills */
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;background:#1a1a1a;border:1px solid #2a2a2a;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:500;color:#a0a0a0}

/* Agent action cards */
.action{background:#141414;border:1px solid #2a2a2a;border-radius:8px;margin-bottom:6px;overflow:hidden}
.action-head{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:12px;color:#a0a0a0}
.action-head .icon{color:#a855f7}
.action-head .label{flex:1;font-family:'JetBrains Mono',monospace}
.action-head .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.action-body{border-top:1px solid #2a2a2a;padding:8px 12px;font-size:11px;font-family:'JetBrains Mono',monospace;white-space:pre-wrap;word-break:break-all;color:#a0a0a0;max-height:200px;overflow:auto;line-height:1.5}

/* Thinking */
.thinking{display:flex;align-items:center;gap:8px;padding:12px 0;color:#666;font-size:13px}
.dots{display:flex;gap:3px}
.dot{width:5px;height:5px;border-radius:50%;background:#666;animation:pulse 1.4s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* Feedback */
.feedback{display:flex;align-items:center;gap:8px;padding:10px 0;border-top:1px solid #1e1e1e;margin-top:8px;flex-wrap:wrap}
.fb-label{font-size:12px;color:#666;margin-right:4px}
.fb{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:6px;border:1px solid #2a2a2a;background:transparent;color:#a0a0a0;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.fb:hover{background:#1a1a1a;color:#ededed}
.fb.yes:hover{border-color:#22c55e;color:#22c55e}
.fb.no:hover{border-color:#ef4444;color:#ef4444}
.fb.keep:hover{border-color:#eab308;color:#eab308}

/* Input */
.input-area{padding:12px 20px 20px;flex-shrink:0;width:100%}
.input-wrap{max-width:768px;margin:0 auto;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:16px;overflow:hidden;transition:border-color .15s;width:100%}
.input-wrap:focus-within{border-color:#3b82f6}
.input-top{display:flex;align-items:flex-end;padding:12px 16px;gap:8px}
.input-field{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:#ededed;resize:none;min-height:24px;max-height:200px;line-height:1.5;font-family:'Inter',sans-serif;width:100%}
.input-field::placeholder{color:#666}
.input-field:disabled{opacity:.5}
.send{width:32px;height:32px;border-radius:8px;background:#3b82f6;border:none;color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.send:hover{background:#2563eb}
.send:disabled{opacity:.3;cursor:not-allowed}
.input-bottom{display:flex;align-items:center;gap:4px;padding:8px 12px;border-top:1px solid #1e1e1e;flex-wrap:wrap}
.input-btn{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:4px;background:transparent;border:none;color:#666;font-size:11px;cursor:pointer;font-family:inherit}
.input-btn:hover{background:#252525;color:#a0a0a0}
.disclaimer{font-size:10px;color:#444}

/* Welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:32px 16px;text-align:center}
.welcome h1{font-size:26px;font-weight:600;color:#ededed;margin-bottom:8px;letter-spacing:-.02em}
.welcome .sub{font-size:14px;color:#666;margin-bottom:28px;max-width:400px}
.welcome-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:500px;width:100%;margin-bottom:20px}
.welcome-card{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:14px;text-align:left;cursor:pointer;transition:all .15s;font-size:12px;color:#a0a0a0;line-height:1.4}
.welcome-card:hover{border-color:#3b82f6;background:#1a1a1a;color:#ededed}
.welcome-card-title{font-weight:600;font-size:13px;color:#ededed;margin-bottom:3px}
.welcome-footer{display:flex;align-items:center;gap:6px;font-size:11px;color:#444}
.gh-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;border:1px solid #2a2a2a;background:transparent;color:#a0a0a0;font-size:12px;cursor:pointer;margin-top:12px;font-family:inherit}
.gh-btn:hover{border-color:#3b82f6;color:#ededed}
.new-badge{font-size:9px;font-weight:700;color:#3b82f6;background:rgba(59,130,246,.15);padding:1px 5px;border-radius:3px}

/* Workspace */
.workspace{width:300px;min-width:260px;background:#141414;border-left:1px solid #2a2a2a;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.ws-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #2a2a2a;flex-shrink:0}
.ws-title{font-size:13px;font-weight:600}
.ws-close{background:transparent;border:none;color:#666;cursor:pointer;padding:4px;border-radius:4px;display:flex;align-items:center}
.ws-close:hover{background:#252525;color:#ededed}
.ws-tabs{display:flex;gap:2px;padding:6px 10px;border-bottom:1px solid #2a2a2a;flex-shrink:0}
.ws-tab{padding:5px 12px;border-radius:6px;background:transparent;border:none;color:#666;font-size:12px;cursor:pointer;font-family:inherit}
.ws-tab:hover{color:#a0a0a0}
.ws-tab.active{background:#1a1a1a;color:#ededed;font-weight:500}
.ws-body{flex:1;overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch}
.ws-file{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:12px;cursor:pointer;color:#a0a0a0;position:relative}
.ws-file:hover{background:#252525}
.ws-file.active{background:#1a1a1a;color:#ededed}
.ws-file.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:16px;background:#3b82f6;border-radius:0 3px 3px 0}
.ws-file-icon{width:16px;text-align:center;font-size:9px;font-weight:700;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.ws-file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ws-preview{padding:12px}
.ws-preview-content{background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:14px;font-size:11px;font-family:'JetBrains Mono',monospace;white-space:pre-wrap;word-break:break-all;line-height:1.5;color:#a0a0a0;max-height:100%;overflow:auto}
.ws-preview-iframe{width:100%;height:350px;border:1px solid #2a2a2a;border-radius:8px;background:white}

/* Attach chips */
.chips{max-width:768px;margin:0 auto 8px;display:flex;gap:6px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:6px;padding:4px 10px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;font-size:11px}
.chip-x{background:transparent;border:none;color:#666;cursor:pointer;padding:0;display:flex}

/* Modal / Dialog */
.modal-backdrop{position:fixed;inset:0;background:rgba(4,5,8,0.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;animation:fadeIn .2s ease}
.modal{background:#141414;border:1px solid #2a2a2a;border-radius:12px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:modalIn .25s cubic-bezier(0.16,1,0.3,1)}
@keyframes modalIn{from{opacity:0;transform:translateY(8px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-header h3{font-size:16px;font-weight:600}
.modal-close{background:transparent;border:none;color:#666;cursor:pointer;padding:4px;border-radius:4px;display:flex;align-items:center}
.modal-close:hover{background:#252525;color:#ededed}

/* Command Palette */
.cmd-backdrop{position:fixed;inset:0;background:rgba(4,5,8,0.6);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:min(20vh,140px);animation:fadeIn .15s ease}
.cmd-palette{width:100%;max-width:520px;background:#141414;border:1px solid #2a2a2a;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.5);overflow:hidden;animation:modalIn .2s cubic-bezier(0.16,1,0.3,1)}
.cmd-input-wrap{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid #2a2a2a}
.cmd-input-wrap svg{color:#666;flex-shrink:0}
.cmd-input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:#ededed;font-family:'Inter',sans-serif}
.cmd-input::placeholder{color:#666}
.cmd-list{max-height:340px;overflow-y:auto;padding:8px}
.cmd-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#a0a0a0;transition:all .1s}
.cmd-item:hover,.cmd-item.active{background:#252525;color:#ededed}
.cmd-item.active{background:#1a1a1a}
.cmd-footer{padding:10px 18px;border-top:1px solid #2a2a2a;display:flex;align-items:center;gap:16px;font-size:11px;color:#444}
.cmd-footer kbd{font-family:'JetBrains Mono',monospace;font-size:10px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:3px;padding:1px 5px;margin-right:4px}

/* Toast notification */
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;border:1px solid #2a2a2a;padding:10px 16px;border-radius:8px;font-size:13px;color:#ededed;z-index:999;animation:fadeIn .3s ease;box-shadow:0 4px 16px rgba(0,0,0,0.4)}

/* Tooltip */
.tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #2a2a2a;padding:4px 10px;border-radius:6px;font-size:11px;color:#ededed;white-space:nowrap;z-index:50;pointer-events:none;animation:fadeIn .15s ease}

/* Responsive */
@media(max-width:768px){
  .nav-link{display:none}
  .workspace{position:fixed;top:48px;left:0;right:0;bottom:0;width:100%;max-width:100%;min-width:100%;z-index:50;border-left:none}
  .inner{padding:0 12px}
  .input-area{padding:8px 12px 16px}
  .welcome-grid{grid-template-columns:1fr}
  .welcome h1{font-size:22px}
  .msg{gap:8px}
}
</style>
</head>

<script>
// ── State ──────────────────────────────────────────────────────
let state = {
  messages: [],
  input: '',
  isStreaming: false,
  streamingContent: '',
  streamingActions: [],
  showWorkspace: true,
  wsTab: 'files',
  selectedFile: null,
  fileContent: '',
  feedback: {},
  sessionId: null,
  tree: [],
  showActions: {},
};

// ── API ────────────────────────────────────────────────────────
const api = {
  async chat(message) {
    const res = await fetch('/api/agent/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, execute_tools: true }),
    });
    return res.json();
  },
  async upload(file) {
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch('/api/agent/upload', { method: 'POST', body: fd });
    return res.json();
  },
  async tree() {
    const res = await fetch('/api/workspace/tree');
    return res.json();
  },
  async readFile(path) {
    const res = await fetch('/api/workspace/file?path=' + encodeURIComponent(path));
    return res.json();
  },
};

// ── Render ─────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const hasMessages = state.messages.length > 0;
  const lastAgent = [...state.messages].reverse().find(m => m.role === 'agent');

  app.innerHTML = `
    <div class="shell">
      <!-- Top Nav -->
      <nav class="nav">
        <div class="nav-left">
          <div class="nav-logo">${icon('bot')} Arena</div>
          <div class="nav-mode">Agent Mode ▾</div>
          <button class="nav-link" onclick="newChat()">New Chat</button>
        </div>
        <div class="nav-right">
          <button class="nav-link" onclick="toggleWs()">${icon('panelRight')} Workspace</button>
          <button class="nav-link" onclick="location.href='/logout'">${icon('logout')}</button>
        </div>
      </nav>

      <!-- Main -->
      <div class="main">
        <!-- Chat -->
        <div class="chat">
          <div class="scroll" id="scroll">
            <div class="inner">
              ${!hasMessages && !state.isStreaming ? renderWelcome() : renderMessages(lastAgent)}
            </div>
          </div>
          ${renderInput()}
        </div>

        <!-- Workspace -->
        ${state.showWorkspace ? renderWorkspace() : ''}
      </div>
    </div>
  `;

  // Scroll to bottom
  const el = document.getElementById('scroll');
  if (el) el.scrollTop = el.scrollHeight;

  // Re-bind input
  const field = document.getElementById('msg-input');
  if (field) {
    field.value = state.input;
    field.addEventListener('input', function() {
      state.input = this.value;
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 200) + 'px';
    });
    field.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  }
}

function renderWelcome() {
  return `
    <div class="welcome">
      <h1>What would you like to do?</h1>
      <p class="sub">Arena can build apps, write code, research topics, and complete tasks autonomously.</p>
      <div class="welcome-grid">
        ${['Create a landing page|Create a sleek, modern landing page',
           'Build a dashboard|Turn data into interactive charts',
           'Make a game|Build a playable browser game',
           'Design to Code|Upload an image and have AI build it',
           'Build a fullstack app|Create a templated full-stack app',
           'Launch a storefront|Create a beautiful online shop'
        ].map(s => {
          const [title, desc] = s.split('|');
          return `<div class="welcome-card" onclick="sendSuggestion('${title}')"><div class="welcome-card-title">${title}</div>${desc}</div>`;
        }).join('')}
      </div>
      <div class="welcome-footer">${icon('paperclip')} Drop files… Add files</div>
      <button class="gh-btn">${icon('github')} Connect your GitHub <span class="new-badge">NEW</span></button>
    </div>
  `;
}

function renderMessages(lastAgent) {
  return state.messages.map((msg, i) => {
    const isUser = msg.role === 'user';
    const isLast = lastAgent && msg.id === lastAgent.id;
    let extra = '';

    // Tool pills
    if (msg.toolCalls?.length && !msg.actions?.length) {
      extra += `<div class="pills">${msg.toolCalls.map(tc =>
        `<span class="pill">${icon(getToolIcon(tc.tool))} ${tc.tool}</span>`
      ).join('')}</div>`;
    }

    // Agent actions (bash, code, etc.)
    if (msg.actions?.length) {
      extra += msg.actions.map((a, j) => renderAction(a, msg.id, j)).join('');
    }

    // Feedback
    let feedbackHtml = '';
    if (isLast && !state.feedback[msg.id] && !state.isStreaming) {
      feedbackHtml = `
        <div class="feedback">
          <span class="fb-label">Was this task successful?</span>
          <button class="fb yes" onclick="giveFeedback(${msg.id},'yes')">${icon('thumbsUp')} Yes</button>
          <button class="fb no" onclick="giveFeedback(${msg.id},'no')">${icon('thumbsDown')} No</button>
          <button class="fb keep" onclick="giveFeedback(${msg.id},'keep')">${icon('rotate')} Keep working</button>
        </div>
      `;
    }

    return `
      <div class="msg">
        <div class="avatar ${msg.role}">${isUser ? icon('user') : icon('bot')}</div>
        <div class="body">
          <div class="role">${isUser ? 'You' : 'Arena'}</div>
          ${extra}
          <div class="text">${renderContent(msg.content)}</div>
        </div>
      </div>
      ${feedbackHtml}
    `;
  }).join('') + (state.isStreaming ? renderStreaming() : '');
}

function renderStreaming() {
  let actionsHtml = state.streamingActions.map((a, j) => renderAction(a, 'stream', j)).join('');
  return `
    <div class="msg">
      <div class="avatar agent">${icon('bot')}</div>
      <div class="body">
        <div class="role">Arena</div>
        ${actionsHtml}
        ${state.streamingContent
          ? `<div class="text">${renderContent(state.streamingContent)}</div>`
          : `<div class="thinking"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div> Thinking…</div>`
        }
      </div>
    </div>
  `;
}

function renderAction(action, msgId, idx) {
  const expanded = state.showActions[`${msgId}-${idx}`];
  const statusColor = action.status === 'success' ? '#22c55e' : action.status === 'error' ? '#ef4444' : '#eab308';
  const toolIcon = action.tool === 'shell' || action.tool === 'bash' ? 'terminal'
    : action.tool === 'execute_code' ? 'code' : action.tool === 'web_search' ? 'search' : 'wrench';

  return `
    <div class="action">
      <div class="action-head" onclick="toggleAction('${msgId}-${idx}')">
        <span class="icon">${icon(toolIcon)}</span>
        <span class="label">${action.display || action.tool}</span>
        ${action.status === 'running'
          ? `<div class="dots" style="gap:2"><div class="dot" style="width:4px;height:4px"></div><div class="dot" style="width:4px;height:4px"></div><div class="dot" style="width:4px;height:4px"></div></div>`
          : `<span class="dot" style="background:${statusColor}"></span>`
        }
        ${expanded ? icon('chevUp') : icon('chevDown')}
      </div>
      ${expanded && action.result ? `<div class="action-body">${escHtml(typeof action.result === 'string' ? action.result : JSON.stringify(action.result, null, 2))}</div>` : ''}
    </div>
  `;
}

function renderInput() {
  return `
    <div class="input-area">
      <div class="input-wrap">
        <div class="input-top">
          <textarea id="msg-input" class="input-field" placeholder="What would you like to do?" rows="1" ${state.isStreaming ? 'disabled' : ''}></textarea>
          <input type="file" id="file-input" style="display:none" multiple accept=".png,.jpg,.jpeg,.webp,.gif,.pdf,.txt,.md,.csv,.html,.css,.js,.json,.xml,.py,.ts,.sh,.yaml,.sql" onchange="handleFiles(this.files)">
          <button class="input-btn" onclick="document.getElementById('file-input').click()" style="padding:6px">${icon('paperclip')}</button>
          <button class="send" onclick="sendMessage()" ${state.isStreaming || !state.input.trim() ? 'disabled' : ''}>${icon('send')}</button>
        </div>
        <div class="input-bottom">
          <button class="input-btn" onclick="document.getElementById('file-input').click()">${icon('paperclip')} Add files</button>
          <button class="input-btn" onclick="toggleWs()">${icon('panelRight')} Files</button>
          <span class="disclaimer">Inputs are processed by AI and responses may be inaccurate.</span>
        </div>
      </div>
    </div>
  `;
}

function renderWorkspace() {
  return `
    <div class="workspace">
      <div class="ws-head">
        <span class="ws-title">Workspace</span>
        <button class="ws-close" onclick="toggleWs()">${icon('x')}</button>
      </div>
      <div class="ws-tabs">
        <button class="ws-tab ${state.wsTab==='files'?'active':''}" onclick="state.wsTab='files';render()">files</button>
        <button class="ws-tab ${state.wsTab==='preview'?'active':''}" onclick="state.wsTab='preview';render()">preview</button>
      </div>
      <div class="ws-body">
        ${state.wsTab === 'files' ? renderFileTree() : renderPreview()}
      </div>
    </div>
  `;
}

function renderFileTree() {
  if (!state.tree.length) return '<div style="padding:20px;text-align:center;color:#666;font-size:12px">Files created by the agent will appear here</div>';
  return state.tree.map(n => renderTreeNode(n, 0)).join('');
}

function renderTreeNode(node, depth) {
  const indent = 8 + depth * 14;
  const ext = node.name.split('.').pop()?.toLowerCase();
  const colors = {py:'#3572A5',js:'#f1e05a',ts:'#3178c6',json:'#666',md:'#22c55e',html:'#e34c26',css:'#563d7c'};

  if (node.is_dir) {
    return `
      <div class="ws-file" style="padding-left:${indent}px" onclick="toggleDir('${node.path}')">
        ${icon('chevRight')}
        <span style="color:#eab308;opacity:.7">${icon('folder')}</span>
        <span class="ws-file-name">${node.name}</span>
      </div>
    `;
  }

  return `
    <div class="ws-file ${state.selectedFile===node.path?'active':''}" style="padding-left:${indent}px" onclick="openFile('${node.path}')">
      <span class="ws-file-icon" style="color:${colors[ext]||'#666'}">${(ext||'').toUpperCase().slice(0,2)||'·'}</span>
      <span class="ws-file-name">${node.name}</span>
    </div>
  `;
}

function renderPreview() {
  if (!state.selectedFile) return '<div style="padding:20px;text-align:center;color:#666;font-size:12px">Click a file to preview</div>';
  const isHtml = state.selectedFile.match(/\.html?$/);
  return `
    <div class="ws-preview">
      <div style="font-size:11px;color:#666;margin-bottom:8px">${state.selectedFile}</div>
      ${isHtml
        ? `<iframe class="ws-preview-iframe" srcdoc="${escAttr(state.fileContent)}" sandbox="allow-scripts"></iframe>`
        : `<pre class="ws-preview-content">${escHtml(state.fileContent)}</pre>`
      }
    </div>
  `;
}

function renderContent(text) {
  if (!text) return '';
  // Code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => `<pre><code>${escHtml(code)}</code></pre>`);
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Images
  text = text.replace(/!\[.*?\]\((.*?)\)/g, '<img src="$1" style="max-width:100%;border-radius:8px;margin:8px 0">');
  // Line breaks
  text = text.replace(/\n/g, '<br>');
  return text;
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getToolIcon(name) {
  const map = {read_file:'file',write_file:'file',list_files:'folder',execute_code:'code',run_code:'code',shell:'terminal',bash:'terminal',command:'terminal',web_search:'search',search:'search',install:'wrench'};
  return map[name] || 'wrench';
}

// ── Actions ────────────────────────────────────────────────────
function newChat() {
  state.messages = []; state.feedback = {}; state.sessionId = null;
  state.selectedFile = null; state.fileContent = '';
  render();
}

function toggleWs() {
  state.showWorkspace = !state.showWorkspace;
  render();
}

function toggleAction(key) {
  state.showActions[key] = !state.showActions[key];
  render();
}

function sendSuggestion(text) {
  state.input = text;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const msg = input ? input.value.trim() : state.input.trim();
  if (!msg || state.isStreaming) return;

  state.input = '';
  state.isStreaming = true;
  state.streamingContent = '';
  state.streamingActions = [];
  state.messages.push({ id: Date.now(), role: 'user', content: msg, timestamp: new Date() });
  render();

  try {
    const data = await api.chat(msg);

    state.messages.push({
      id: Date.now() + 1,
      role: 'agent',
      content: data.response,
      toolCalls: data.tool_calls || [],
      actions: data.actions || [],
      thinking: data.thinking,
      timestamp: new Date(),
    });

    if (data.tool_calls?.length > 0) {
      state.showWorkspace = true;
      refreshTree();
    }
  } catch (e) {
    state.messages.push({ id: Date.now() + 1, role: 'agent', content: 'Error: ' + e.message, timestamp: new Date() });
  }

  state.isStreaming = false;
  state.streamingContent = '';
  state.streamingActions = [];
  render();
}

function giveFeedback(msgId, value) {
  state.feedback[msgId] = value;
  render();
  const msgs = { yes: 'Thanks!', no: 'Recorded', keep: 'Continuing…' };
  // Simple toast
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msgs[value];
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

async function handleFiles(files) {
  for (const file of files) {
    try {
      const result = await api.upload(file);
      // Add as file reference in input
      const input = document.getElementById('msg-input');
      if (input) input.value += (input.value ? '\n' : '') + `[Attached: ${result.filename}]`;
      state.input = input?.value || '';
      state.showWorkspace = true;
      refreshTree();
      render();
    } catch (e) {
      console.error('Upload failed:', e);
    }
  }
}

async function openFile(path) {
  try {
    const data = await api.readFile(path);
    state.selectedFile = path;
    state.fileContent = data.content || '';
    state.wsTab = 'preview';
    render();
  } catch (e) {
    console.error('Read failed:', e);
  }
}

async function refreshTree() {
  try {
    state.tree = await api.tree();
    render();
  } catch (e) {}
}

// ── Init ───────────────────────────────────────────────────────
render();
refreshTree();
setInterval(refreshTree, 10000);

// Make functions global
window.newChat = newChat;
window.toggleWs = toggleWs;
window.toggleAction = toggleAction;
window.sendSuggestion = sendSuggestion;
window.sendMessage = sendMessage;
window.giveFeedback = giveFeedback;
window.handleFiles = handleFiles;
window.openFile = openFile;
</script>
</body>
</html>
